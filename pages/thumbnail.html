<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- file: needed in img-src for local thumbnail paths (thumbnail/index.ts) — ideally migrate to app:// protocol -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>supahscreenrecordah — Thumbnail Review</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: transparent;
        color: #e0e0e0;
        overflow: hidden;
        user-select: none;
      }

      .modal {
        background: #1a1a2e;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        background: rgba(0, 0, 0, 0.3);
        -webkit-app-region: drag;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .modal-title {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.3px;
      }

      .modal-close {
        -webkit-app-region: no-drag;
        background: none;
        border: none;
        color: #888;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: all 0.15s;
      }
      .modal-close:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

      .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
      }

      /* Status bar */
      .status-bar {
        padding: 8px 16px;
        background: rgba(99, 102, 241, 0.15);
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #a5b4fc;
        display: none;
      }
      .status-bar.visible { display: block; }
      .status-bar.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

      /* Platform tabs */
      .platform-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .platform-tab {
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #aaa;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .platform-tab:hover { background: rgba(255, 255, 255, 0.08); color: #ddd; }
      .platform-tab.active {
        background: rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.5);
        color: #a5b4fc;
      }

      /* Aspect ratio sections */
      .aspect-section {
        display: none;
        animation: fadeIn 0.2s ease;
      }
      .aspect-section.active { display: block; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #c4b5fd;
        margin-bottom: 12px;
      }

      /* Thumbnail grid */
      .thumb-grid {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .thumb-card {
        position: relative;
        border-radius: 10px;
        border: 2px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        background: rgba(0, 0, 0, 0.3);
      }
      .thumb-card:hover { border-color: rgba(99, 102, 241, 0.4); }
      .thumb-card.selected {
        border-color: #6366f1;
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
      }

      .thumb-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .thumb-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.7);
        font-size: 10px;
        color: #ccc;
        text-align: center;
      }

      .thumb-card.ai-generated .thumb-label {
        background: rgba(99, 102, 241, 0.7);
        color: #fff;
      }

      .thumb-card.loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Prompt area */
      .prompt-area {
        margin-bottom: 16px;
      }

      .prompt-area label {
        display: block;
        font-size: 12px;
        color: #888;
        margin-bottom: 6px;
        font-weight: 500;
      }

      .prompt-row {
        display: flex;
        gap: 8px;
      }

      .prompt-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        resize: vertical;
        min-height: 60px;
      }
      .prompt-input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
      }

      .title-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 12px;
        color: #e0e0e0;
        font-size: 13px;
        font-family: inherit;
        margin-bottom: 8px;
      }
      .title-input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
      }

      .btn {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn-regen {
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        border: 1px solid rgba(99, 102, 241, 0.3);
        align-self: flex-end;
      }
      .btn-regen:hover { background: rgba(99, 102, 241, 0.35); }
      .btn-regen:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Platform checkboxes */
      .platform-checks {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }

      .platform-check {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #aaa;
      }

      .platform-check input[type="checkbox"] {
        accent-color: #6366f1;
      }

      /* Footer */
      .modal-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.3);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .footer-right {
        display: flex;
        gap: 8px;
      }

      .btn-skip {
        background: rgba(255, 255, 255, 0.06);
        color: #aaa;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .btn-skip:hover { background: rgba(255, 255, 255, 0.12); color: #ddd; }

      .btn-save {
        background: #6366f1;
        color: #fff;
      }
      .btn-save:hover { background: #5558e6; }
      .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Scrollbar */
      .modal-body::-webkit-scrollbar { width: 6px; }
      .modal-body::-webkit-scrollbar-track { background: transparent; }
      .modal-body::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Thumbnail Review</span>
        <button id="close-btn" class="modal-close" title="Close">✕</button>
      </div>

      <div class="modal-body">
        <div id="status-bar" class="status-bar"></div>

        <div id="platform-tabs" class="platform-tabs"></div>

        <div id="sections-container"></div>
      </div>

      <div class="modal-footer">
        <div class="footer-left">
          <div id="platform-checks" class="platform-checks"></div>
        </div>
        <div class="footer-right">
          <button id="skip-btn" class="btn btn-skip">Skip Thumbnails</button>
          <button id="save-btn" class="btn btn-save" disabled>Save All</button>
        </div>
      </div>
    </div>

    <script src="../dist/renderer/thumbnail/index.js"></script>
  </body>
</html>
