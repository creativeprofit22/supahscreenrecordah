<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- file: needed in media-src (playback.ts) and img-src (watermark.ts) — ideally migrate to app:// protocol -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; media-src 'self' blob: mediastream: file:; img-src 'self' data: blob: file:; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>supahscreenrecordah — Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@800;900&family=Poppins:wght@600;700&family=Luckiest+Guy&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../dist/renderer/styles/main.css" />
  </head>
  <body>
    <div class="preview-container">
      <!-- Background canvas — ambient particles rendered behind everything -->
      <canvas id="bg-canvas" class="bg-canvas"></canvas>

      <!-- Screen capture on the left (wrapper clips overflow in shorts mode) -->
      <div id="screen-wrapper" class="screen-wrapper">
        <video id="screen-video" class="screen-video" autoplay muted playsinline></video>
      </div>
      <!-- Camera portrait on the right (container holds video + waveform) -->
      <div id="camera-container" class="camera-container">
        <video id="camera-video" class="camera-video" autoplay muted playsinline></video>
        <!-- Audio waveform visualizer — bottom of camera -->
        <canvas id="waveform-canvas" class="waveform-canvas"></canvas>
      </div>
      <!-- Cursor overlay — drawn when OS cursor freezes in captured stream -->
      <div id="cursor-overlay" class="cursor-overlay"></div>
      <!-- Shorts preview canvas — replaces video elements in 9:16 mode -->
      <canvas id="shorts-preview-canvas" class="shorts-preview-canvas"></canvas>

      <!-- Action feed overlay — drawn on top of camera -->
      <canvas id="action-feed-canvas" class="action-feed-canvas"></canvas>

      <!-- Name overlay — anchored below camera -->
      <div id="camera-name" class="camera-name" hidden></div>
      <!-- Socials overlay — anchored below name -->
      <div id="camera-socials" class="camera-socials"></div>

      <!-- CTA popup — slides in from bottom during recording -->
      <div id="cta-popup" class="cta-popup"></div>

      <!-- Idle state (hidden by default) -->
      <div id="idle-state" class="idle-state hidden"></div>
    </div>

    <!-- Processing overlay — shown while remuxing/enhancing -->
    <div id="processing-overlay" class="processing-overlay hidden">
      <div class="processing-card">
        <div class="processing-spinner"></div>
        <div class="processing-text">Processing recording...</div>
        <div class="processing-sub" id="processing-sub">Remuxing and enhancing audio</div>
      </div>
    </div>

    <!-- Playback overlay — shown after recording stops -->
    <div id="playback-container" class="playback-container hidden">
      <div class="playback-video-wrapper">
        <video id="playback-video" class="playback-video" controls playsinline></video>
        <canvas id="caption-overlay" class="caption-overlay"></canvas>
      </div>
      <div id="review-actions-bar" class="review-actions-bar">
        <button id="auto-trim-btn" class="playback-btn playback-btn--auto-trim">Auto-trim <span class="dropdown-arrow">▾</span></button>
        <button id="undo-all-btn" class="playback-btn playback-btn--undo-all">Undo All</button>
        <div class="review-actions-spacer"></div>
        <div class="caption-controls">
          <button id="caption-toggle-btn" class="playback-btn playback-btn--caption">CC</button>
          <label class="srt-toggle hidden" id="srt-toggle-label">
            <input type="checkbox" id="srt-export-checkbox" />
            <span>.srt</span>
          </label>
        </div>
      </div>
      <div id="caption-style-picker" class="caption-style-picker hidden">
        <div class="style-card" data-style="clean">
          <span class="style-sample style-sample--clean">The quick brown fox</span>
          <span class="style-label">Clean</span>
        </div>
        <div class="style-card" data-style="spotlight">
          <span class="style-sample style-sample--spotlight">The quick brown fox</span>
          <span class="style-label">Spotlight</span>
        </div>
        <div class="style-card" data-style="electric">
          <span class="style-sample style-sample--electric">The quick brown fox</span>
          <span class="style-label">Electric</span>
        </div>
        <div class="style-card" data-style="knockout">
          <span class="style-sample style-sample--knockout">The quick brown fox</span>
          <span class="style-label">Knockout</span>
        </div>
        <div class="style-card" data-style="candy">
          <span class="style-sample style-sample--candy">The quick brown fox</span>
          <span class="style-label">Candy</span>
        </div>
        <div class="style-card" data-style="flow">
          <span class="style-sample style-sample--flow">The quick brown fox</span>
          <span class="style-label">Flow</span>
        </div>
      </div>
      <div id="review-timeline" class="review-timeline">
        <div class="timeline-legend">
          <span class="legend-item"><span class="legend-swatch legend-swatch--silence"></span>Silence</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--filler"></span>Filler</span>
          <span class="legend-item"><span class="legend-swatch legend-swatch--cut"></span>Will be cut</span>
          <span class="legend-hint">Click segment to toggle &middot; Drag edges to adjust</span>
        </div>
        <canvas id="timeline-canvas" class="timeline-canvas"></canvas>
      </div>
      <div class="playback-actions">
        <button id="playback-skip-btn" class="playback-btn playback-btn--skip">Skip</button>
        <button id="playback-exit-btn" class="playback-btn playback-btn--exit">Exit</button>
        <button id="playback-export-btn" class="playback-btn playback-btn--export">Export</button>
      </div>
    </div>

    <script src="../dist/renderer/main/index.js"></script>
  </body>
</html>
